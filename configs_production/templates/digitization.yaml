# Example configuration
dataset: "lowpileup_gg2ttbar"
version: "v1"
stage: "digitization"  # One of: generation, merge_smear, simulation, digitization
job_config:
  # Number of nodes will be calculated as n_runs / runs_per_node
  n_runs: 16  # Number of jobs to submit
  runs_per_node: 16  # Number of runs per node
  time_limit: "00:30:00"  # Time limit per job
  qos: "debug"

validation_config:
  time_limit: "00:10:00"
  qos: "debug"

# Stage-specific configurations
events: 2  # Number of events per run, total number of events will be n_runs * events
digi: True
reco: True
performance_metrics: False

# Common settings
common:
  output_base_dir: "/global/cfs/cdirs/m3443/usr/dtmurnane/Side_Work/ACTS/outputs/low_pileup_pilot/"
  account: "m4958"
  container: "registry.cern.ch/atlasadc/atlas-grid-almalinux9"
