#==============================================
# Single Muon 10 GeV Simulation with Random Distributions
#==============================================

# --- Dataset & Version ---
campaign: "single_particle_pilot"
dataset: "muon_10GeV"
version: "v4"
stage: "simulation"

# --- Job Configuration ---
job_config:
  n_runs: 1
  runs_per_node: 1
  time_limit: "00:30:00"
  qos: "debug"
  # execution_mode: "distributed_slurm"
  execution_mode: "interactive"

validation_config:

# Stage-specific configurations
events: 10
single_particle: true

# Particle gun configuration
gun_particle: "mu-"  # Muons
gun_energy: 10.0  # Energy in GeV
minimalKineticEnergy: 0.001  # Minimum kinetic energy in GeV to register in truth
truthParticleHandler: "Geant4FullTruthParticleHandler"
threads: 2

# Random direction distribution
gun_distribution: "eta"  # Uniform on unit sphere
gun_eta_min: "-3.0"  # Minimum eta angle
gun_eta_max: "3.0"  # Maximum eta angle
gun_phi_min: "0*deg"  # Minimum phi angle
gun_phi_max: "360*deg"  # Maximum phi angle

# Position configuration with vertex smearing
gun_position: [0.0, 0.0, 0.0]  # Position vector [x, y, z] in mm

# Vertex smearing (using DD4hep's built-in smearing)
vertexOffset: [0.0, 0.0, 0.0, 0.0]  # Mean offset [x, y, z, t] in mm and ns
vertexSigma: [0.0125, 0.0125, 55.5, 5.0]  # Sigma of smearing [x, y, z, t] in mm and ns

# Multiplicity (number of particles per event)
gun_multiplicity: 1