# Particle Gun Configuration - Single Photons with Log-Uniform Energy
campaign: "full_pileup_pilot"
dataset: "single_photon"
version: "v1"
stage: "particlegun_generation"

# Job Configuration
job_config:
  n_runs: 100
  runs_per_node: 32
  time_limit: "00:15:00"
  qos: "regular"
  execution_mode: "distributed_slurm"

# Event Generation
events: 1000
seed: 42

# Particle Gun Settings
particle: "gamma"
energy_min: 1.0
energy_max: 1000.0
energy_distribution: "log-uniform"  # Options: "uniform", "log-uniform"

# Angular Distribution
eta_min: -2.5
eta_max: 2.5
phi_min: 0.0
phi_max: 6.28318530718  # 2*pi
