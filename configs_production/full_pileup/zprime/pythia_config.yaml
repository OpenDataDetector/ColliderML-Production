campaign: "full_pileup"
dataset: "zprime_ssm"
version: "v1"
stage: "pythia_generation"  # Full-pileup Z' SSM generation (signal + pileup + merge)

job_config:
  # Number of nodes will be calculated as n_runs / runs_per_node
  n_runs: 2100            # Number of runs (tune as needed)
  runs_per_node: 16       # Number of runs per node
  time_limit: "00:30:00"  # Time limit per job
  qos: "regular"
  execution_mode: "multi_node_slurm"

# Stage-specific configurations
# This config generates Z' hard scatter, SoftQCD pileup, and the merged sample
# in a single stage. It still writes out both signal and pileup HepMC3 files
# as well as the merged file.
events: 64        # Events per run; total events = n_runs * events
pileup: 200       # Target average pileup multiplicity

pdg_file: "/global/cfs/cdirs/m4958/usr/danieltm/ColliderML/software/colliderml_dev/configs_production/hard_scatter/zprime/particle.tbl"

# Sequential Standard Model Z' benchmark (Drell–Yan production)
# Explicitly enable the process
hard_process: "NewGaugeBoson:ffbar2gmZprime = on"

# Vertex smearing matching full-pileup configuration for merge
vertex_sigma_xy: 0.0125  # mm
vertex_sigma_z: 55.5     # mm
vertex_sigma_t: 0.185    # ns

pythia_settings:
  # Z' mass and width (3 TeV, ~1% width as a starting point)
  - "32:m0 = 3000.0"
  - "32:mWidth = 30.0"

  # Focus on dilepton final states (e, μ); user can extend to τ / jets as needed
  - "32:onMode = off"
  - "32:onIfAny = 11 13"

  # Use standard Pythia8 treatment of γ/Z/Z' mixing; SSM-like couplings
  # gmZmode = 3 enables full interference between gamma*/Z0/Z'
  # This is crucial for realistic SSM simulation
  - "Zprime:gmZmode = 3"

# Enable merge of signal + pileup in the Pythia/ACTS stage
merge: true

# Enable Poisson sampling of pileup multiplicity during merge,
# and buffer generation in the pileup stage.
poisson_sample: true
poisson_buffer_sigma: 5.0
