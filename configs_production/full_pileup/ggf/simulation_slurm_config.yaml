# Example configuration
campaign: "full_pileup_pilot"
dataset: "ggf"
version: "v2"
stage: "simulation"  # One of: generation, merge_smear, simulation, digitization
job_config:
  # Number of nodes will be calculated as n_runs / runs_per_node
  n_runs: 100  # Number of jobs to submit
  runs_per_node: 8  # Number of runs per node
  time_limit: "06:00:00"  # Time limit per job
  qos: "regular"
  execution_mode: "multi_node_slurm"
  depends_on: "42568905"

validation_config:
  time_limit: "00:60:00"
  qos: "regular"

# Stage-specific configurations
events: 128  # Number of events per run, total number of events will be n_runs * events
threads: 8
minimalKineticEnergy: 0.001  # Minimum kinetic energy in GeV to register in truth
truthParticleHandler: "Geant4FullTruthParticleHandler"

