# Config to drive convert_all.py
campaign: "full_pileup"
dataset: "ttbar"
version: "v1"
stage: "convert_all"

# Job submission configuration
job_config:
  n_runs: 8  # Number of jobs to submit
  # n_runs: 1
  runs_per_node: 2  # Number of runs per node
  # runs_per_node: 1
  time_limit: "00:30:00"  # Time limit per job
  qos: "debug"
  # execution_mode: "interactive"
  execution_mode: "multi_node_slurm"

# Optional validation job to run after convert_all
# validation_config:
#   qos: "debug"
#   time_limit: "00:30:00"
#   publish_after_validation: true
#   publish_mode: hardlink
#   public_output_base_dir: "/global/cfs/cdirs/m4958/data/ColliderML/public/testing"
#   publish_overwrite: true
#   update_manifest: true
#   manifest_path: "/global/cfs/cdirs/m4958/data/ColliderML/public/manifest.json"

# Objects to convert (any subset of: digihits, hits, tracks, particles, calorimeter)
objects:
  - tracker_hits
  - tracks
  - particles
  - calo_hits
output_format: "parquet"

# Chunking
# chunk_size: 1000
chunk_size: 100
run_size: 128

# Column selection for H5 outputs
particles_columns_keep:
  - "particle_id"
  - "pdg_id"
  - "mass"
  - "energy"
  - "charge"
  - "vx"
  - "vy"
  - "vz"
  - "time"
  - "px"
  - "py"
  - "pz"
  - "vertex_primary"
  - "parent_id"

digihits_columns_keep:
  - "x"
  - "y"
  - "z"
  - "true_x"
  - "true_y"
  - "true_z"
  - "time"
  - "particle_id"
  - "cell_id"
  - "detector"
  - "volume_id"
  - "layer_id"
  - "surface_id"

tracks_columns_keep:
  - "d0"
  - "z0"
  - "phi"
  - "theta"
  - "qop"
  - "majority_particle_id"

calo_columns_keep:
  - "event_id"
  - "detector"
  - "cell_id"
  - "total_energy"
  - "x"
  - "y"
  - "z"
  - "contrib_particle_ids"
  - "contrib_energies"
  - "contrib_times"

# Processing parameters
max_chunks: 1
min_tracker_hits: 1
min_calo_hits: 1

log_level: "DEBUG"