# Configuration for track conversion postprocessing
dataset: "gg2ttbar"
version: "v2"
stage: "build_tracks"

# Job submission configuration
job_config:
  n_runs: 13  # Number of chunks to process
  runs_per_node: 13  # Number of chunks processed per node
  time_limit: "00:30:00"
  qos: "debug"
  max_cores: 128  # Total cores per node

validation_config:

# Track conversion specific configuration
chunk_size: 1000  # Number of events per output file
run_size: 10      # Number of events per run

# Output configuration
output_path: "pileup-10/ttbar/v2/reco/tracks"  # Path appended to staging_dir

# File patterns and names
tracks_csv_pattern: "event{:09d}-tracks_ambi.csv"
tracksummary_file: "tracksummary_ambi.root"
simhits_file: "simhits.root"
edm4hep_file: "edm4hep.root"

# Common settings
common:
  output_base_dir: "/global/cfs/projectdirs/m4958/data/ColliderML/outputs/low_pileup_pilot"
  staging_dir: "/global/cfs/cdirs/m4958/data/ColliderML/staging"
  account: "m4958"