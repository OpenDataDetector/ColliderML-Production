# Example configuration
version: "v2"
dataset: "gg2ttbar"
stage: "merge_smear"  # One of: generation, merge_smear, simulation, digitization
job_config:
  # Number of nodes will be calculated as n_runs / runs_per_node
  n_runs: 1280  # Number of jobs to submit
  runs_per_node: 128  # Number of runs per node
  time_limit: "00:30:00"  # Time limit per job
  qos: "regular"

validation_config:
  time_limit: "00:10:00"
  qos: "regular"

# Stage-specific configurations
events: 10  # Number of events per run, total number of events will be n_runs * events
vertex_sigma_xy: 0.0125
vertex_sigma_z: 55.5
vertex_sigma_t: 5.0

# Common settings
common:
  output_base_dir: "/global/cfs/projectdirs/m4958/data/ColliderML/outputs/low_pileup_pilot"
  account: "m4958"
  container: "registry.cern.ch/atlasadc/atlas-grid-almalinux9"
