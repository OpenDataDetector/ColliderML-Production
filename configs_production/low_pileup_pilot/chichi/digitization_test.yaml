# Example configuration
dataset: "chichi"
version: "v2"
stage: "digitization"  # One of: generation, merge_smear, simulation, digitization
job_config:
  # Number of nodes will be calculated as n_runs / runs_per_node
  n_runs: 1280  # Number of jobs to submit
  runs_per_node: 32  # Number of runs per node
  time_limit: "00:30:00"  # Time limit per job
  qos: "regular"

validation_config:
  time_limit: "00:10:00"
  qos: "regular"

# Stage-specific configurations
events: 10  # Number of events per run, total number of events will be n_runs * events
digi: True
reco: True
performance_metrics: True
output_csv: True
# digi_config: "odd-digi-geometric-config.json"      # For digitization
ambi_solver: "greedy"                            # For ambiguity resolution 

# Common settings
common:
  output_base_dir: "/global/cfs/cdirs/m4958/data/ColliderML/outputs/low_pileup_pilot"
  account: "m4958"
  container: "registry.cern.ch/atlasadc/atlas-grid-almalinux9"
