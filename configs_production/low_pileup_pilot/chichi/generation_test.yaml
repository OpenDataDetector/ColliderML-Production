# Example configuration
dataset: "chichi"
version: "v2"
stage: "generation"  # One of: generation, merge_smear, simulation, digitization
job_config:
  # Number of nodes will be calculated as n_runs / runs_per_node
  n_runs: 1280  # Number of runs (where a run produces N events)
  runs_per_node: 128  # Number of runs per node
  time_limit: "00:30:00"  # Time limit per job
  qos: "regular"

validation_config:
  time_limit: "00:10:00"
  qos: "regular"

# Stage-specific configurations
events: 10  # Number of events per run, total number of events will be n_runs * events
pileup: 10
hard_process: "SUSY:qqbar2chi0chi0"

# Pythia settings list - all settings in Pythia8 format
pythia_settings:
  # Debug output
  - "Init:showProcesses = false"
  - "Init:showChangedSettings = false"
  - "Init:showAllSettings = false"
  - "Next:numberShowInfo = 0"
  - "Next:numberShowProcess = 0"
  - "Next:numberShowEvent = 0"
  - "Print:quiet = on"
  
  # SUSY configuration
  - "SLHA:file = /global/cfs/projectdirs/m3443/usr/dtmurnane/Side_Work/ACTS/colliderml_dev/configs_production/low_pileup_pilot/chichi/slha2-example.spc"
  - "SLHA:verbose = 3"
  - "SLHA:minMassSM = 100."
  - "SLHA:useDecayTable = off"
  
  # QCD settings
  - "PartonLevel:MPI = on"
  - "PartonLevel:ISR = on"
  - "PartonLevel:FSR = on"
  - "HadronLevel:Hadronize = on"
  
  # Standard settings
  - "Tune:ee = 7"
  - "PDF:pSet = 13"

# Common settings
common:
  output_base_dir: "/global/cfs/projectdirs/m4958/data/ColliderML/outputs/low_pileup_pilot"
  account: "m4958"
  container: "registry.cern.ch/atlasadc/atlas-grid-almalinux9"