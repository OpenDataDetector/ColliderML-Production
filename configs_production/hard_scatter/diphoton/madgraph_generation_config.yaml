#========================================================================
# YAML Configuration for MadGraph Event Generation (LO+MLM diphoton)
#========================================================================
# 
# This configuration is for the second step of the two-step MadGraph workflow:
# 1. madgraph_init: Generate and compile the process 
# 2. madgraph_generation: Parallel event generation using the compiled process (this config)
#
# This stage performs parallel event generation using the pre-compiled process
# directory created by madgraph_init. It follows the same pattern as pythia_generation.

# --- Dataset & Version ---
campaign: "hard_scatter"
dataset: "diphoton"
version: "v1"
stage: "madgraph_generation"

# --- Job Configuration ---
job_config:
  # Number of nodes will be calculated as n_runs / runs_per_node
  n_runs: 110        # Number of runs (where a run produces N events)
  runs_per_node: 32  # Number of runs per node (adjust based on memory/time constraints)
  time_limit: "00:30:00"  # Time limit per job - MadGraph NLO generation is slower than Pythia
  qos: "debug"
  depends_on: 
  execution_mode: "multi_node_slurm"  # Use distributed mode for parallel generation
  # execution_mode: "interactive"
  depends_on: "49404255"

validation_config:

# --- Event Generation Parameters ---
# These follow the exact same pattern as pythia_gen.py and ddsim_run.py. Pythia success rate of ~65%
events: 20000  # Number of events per run, total events = n_runs * events
seed: 42     # Base seed - will be modified per run using run_id

# --- Essential Paths & Environment ---
# These use variables from env_setup.yaml config_defaults
mg_base_path: "{madgraph.mg_base_path}"
generation_scratch_dir: "{madgraph.generation_scratch_dir}" 

# --- Card Customizations (run-level overrides) ---
run_mode: "lo_mlm"
card_customizations:
  run_card:
    "ptj": 10.0      # Minimum jet pT
  pythia8_card: {}

# --- HepMC Splitting Configuration (Optional) ---
# Configure splitting with keys expected by the generation script
splitting_config:
  enable: true
  events_per_file: 1000
  max_files_per_mg_run: 10
  output_filename: "events.hepmc"

# --- Logging ---
log_level: "INFO"
