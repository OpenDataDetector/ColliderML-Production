campaign: "hard_scatter"
dataset: "pileup_only"
version: "v2"
stage: "pythia_generation"

job_config:
  # Number of nodes will be calculated as n_runs / runs_per_node
  # n_runs: 10000             # Number of runs (each produces 10,000 pileup events)
  n_runs: 1000
  # n_runs: 64
  runs_per_node: 32         # Number of runs per node
  time_limit: "06:00:00"    # Time limit per job
  # time_limit: "00:30:00"    # Time limit per job
  qos: "regular"
  # qos: debug
  execution_mode: "multi_node_slurm"

# Stage-specific configurations
events: 10000             # Pileup events per run
# events: 100
pileup: 1                 # Generates events * 1 = 10,000 pileup events per run
                          # Total: 10,000 runs × 10,000 events = 100,000,000 pileup events

# No hard_process field → no hard scatter generation
# No merge: true → outputs standalone pileup file (events_pileup.hepmc3)

# Vertex smearing consistent with other ColliderML configs
vertex_sigma_xy: 0.0125   # mm
vertex_sigma_z: 55.5      # mm
vertex_sigma_t: 0.185     # ns

pythia_settings:
  - "Print:quiet = on"
