# Config to drive convert_all.py
campaign: "hard_scatter"
dataset: "higgs_portal"
version: "v1"
stage: "convert_all"

# Job submission configuration
job_config:
  n_runs: 1000  # Number of jobs to submit
  # n_runs: 10
  runs_per_node: 5  # Number of runs per node
  time_limit: "00:30:00"  # Time limit per job
  # qos: "regular"
  qos: "debug"
  # execution_mode: "interactive"
  execution_mode: "multi_node_slurm"

# Objects to convert (any subset of: digihits, hits, tracks, particles, calorimeter)
objects:
  - tracker_hits
  - tracks
  - particles
  - calo_hits
output_format: "parquet"

# Chunking
chunk_size: 1000
# chunk_size: 8
run_size: 1000

# Column selection for parquet outputs
particles_columns_keep:
  - "particle_id"
  - "pdg_id"
  - "mass"
  - "energy"
  - "charge"
  - "vx"
  - "vy"
  - "vz"
  - "time"
  - "px"
  - "py"
  - "pz"
  - "perigee_d0"
  - "perigee_z0"
  - "vertex_primary"
  - "parent_id"
  - "primary"

digihits_columns_keep:
  - "x"
  - "y"
  - "z"
  - "true_x"
  - "true_y"
  - "true_z"
  - "time"
  - "particle_id"
  - "detector"
  - "volume_id"
  - "layer_id"
  - "surface_id"

tracks_columns_keep:
  - "d0"
  - "z0"
  - "phi"
  - "theta"
  - "qop"
  - "majority_particle_id"

calo_columns_keep:
  - "event_id"
  - "detector"
  - "cell_id"
  - "total_energy"
  - "x"
  - "y"
  - "z"
  - "contrib_particle_ids"
  - "contrib_energies"
  - "contrib_times"

# Processing parameters
max_chunks: 1
min_tracker_hits: 0
min_calo_hits: 0

log_level: "DEBUG"