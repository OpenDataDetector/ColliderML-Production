#========================================================================
# YAML Configuration for MadGraph Event Generation (NLO ttH + FxFx)
#========================================================================
#
# Second step of the two-step MadGraph workflow:
# 1. madgraph_init: Generate and compile the process
# 2. madgraph_generation: Parallel event generation (this config)
#
# Mirrors the CMS official ttH gridpack (tth01j_5f_ckm_NLO_FXFX_MH125),
# adapted to the ColliderML pipeline. Higgs decays inclusively in Pythia8
# (mH = 125 GeV, SM branching ratios) — see the madgraph_init config for
# the full rationale.

# --- Dataset & Version ---
campaign: "hard_scatter"
dataset: "tth"
version: "v1"
stage: "madgraph_generation"

# --- Job Configuration ---
job_config:
  n_runs: 250
  runs_per_node: 1     # NLO ttH is memory-hungry; one run per node
  time_limit: "02:00:00"
  qos: "regular"
  # execution_mode: "monolithic_slurm"
  execution_mode: "multi_node_slurm"
  # execution_mode: "interactive"
  depends_on:

validation_config:

# --- Event Generation Parameters ---
# Total LHE events = n_runs * events. ttH at 14 TeV has sigma ~ 0.6 pb
# (NLO QCD), much smaller than ttbar — but we generate at fixed sample
# size, not luminosity-weighted. Pythia FxFx-matching survival is ~40-50%
# (similar to ttbar).
events: 17500
seed: 42

# --- Essential Paths & Environment ---
mg_base_path: "{madgraph.mg_base_path}"
generation_scratch_dir: "{madgraph.generation_scratch_dir}"

# --- Card Customizations (run-level overrides) ---
card_customizations:
  run_card:
    "ptj": 20.0
    "event_norm": "sum"

  # Keep Qcut consistent with madgraph_init.
  shower_card:
    "Qcut": 30.0
    "time_shower_me_corrections": "F"

  pythia8_card: {}

# --- HepMC Splitting Configuration ---
splitting_config:
  enable: true
  events_per_file: 1280
  max_files_per_mg_run: 50
  output_filename: "events.hepmc"

# --- Logging ---
log_level: "INFO"

# --- Documentation ---
# Higgs decays handled inclusively by Pythia8 (default 25:onMode = on at
# mH = 125 GeV, SM branching ratios). To restrict to a specific channel,
# add to the shower_card / pythia8_card here, e.g.:
#   "25:onMode": "off"
#   "25:onIfAny": "5 -5"   # H -> b b~
#
# Expects that madgraph_init has been run successfully and the tarball
# artifact exists at:
#   {output_base_dir}/{campaign}/{dataset}/{version}/madgraph_process.tgz
#
# Output is placed at:
#   {output_base_dir}/{campaign}/{dataset}/{version}/runs/<run_id>/events.hepmc
#
# Expected runtime per run: 30-90 minutes (NLO ttH ME evaluation is slow)
# Expected output per run: ~10-100 MB of HepMC (compressed)
