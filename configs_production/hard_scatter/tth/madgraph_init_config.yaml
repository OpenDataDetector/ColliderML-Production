#========================================================================
# YAML Configuration for MadGraph Process Initialization (LO+MLM ttH)
#========================================================================
#
# Two-step MadGraph workflow:
# 1. madgraph_init: Generate and compile the process (this config)
# 2. madgraph_generation: Parallel event generation using the compiled process
#
# Process: pp -> t t~ H (+ up to 2 extra QCD jets) at LO, MLM-matched to the
# Pythia8 parton shower.
#
# Why LO+MLM rather than NLO+FxFx?
# This repository uses LO+MLM (with HEFT for ggH / HH / Hjj) for every Higgs
# final-state channel — see configs_production/full_pileup/{ggf,dihiggs}
# and configs_production/hard_scatter/{dihiggs,diphoton,jets}. ttbar is the
# only NLO+FxFx process in the repo. We follow the Higgs-channel convention
# here for consistency with the other H samples in the dataset.
#
# Why sm-no_b_mass and NOT heft?
# HEFT integrates out the top loop and is appropriate for ggH and gg->HH
# where the top is virtual. In ttH the top quarks are *explicit* particles
# in the final state (p p > t t~ h is tree-level via top-Yukawa exchange),
# so HEFT is wrong. We use the full SM with massless b's; b's only appear
# in the final state from t->Wb decays in Pythia, where the 5F vs 4F
# distinction is irrelevant.
#
# Higgs decays:
# H is left undecayed at the matrix-element level. Pythia8 handles H decays
# inclusively at hadronisation. The Pythia8 defaults for PID 25 are:
#   25:m0      = 125.0 GeV
#   25:mWidth  = 4.07e-3 GeV (PDG)
#   25:mayDecay = on
#   25:onMode  = on for all SM channels
# so all H decay channels appear in their SM proportions. To restrict to a
# specific channel later, override these via pythia8_card customizations
# (e.g. "25:onMode": "off" + "25:onIfAny": "5 -5" for H -> b b~).
# MadGraph's sm-no_b_mass model also defaults to mH = 125 GeV in
# param_card.dat, so the ME and shower agree.

# --- Dataset & Version ---
campaign: "hard_scatter"
dataset: "tth"
version: "v1"
stage: "madgraph_init"

# --- Job Configuration ---
job_config:
  n_runs: 1
  runs_per_node: 1
  time_limit: "01:00:00"  # LO compilation; ttH+2j ME generation is still moderately heavy
  qos: "regular"
  execution_mode: "monolithic_slurm"
  # execution_mode: "interactive"

# --- MadGraph Process Definition ---
# Full SM (top is explicit), 5-flavour scheme.
mg_model: "sm-no_b_mass"
mg_definitions: []
mg_generate_command: |
  define p = g u c b d s u~ c~ b~ d~ s~
  define j = p
  generate p p > t t~ h @0
  add process p p > t t~ h j @1
  add process p p > t t~ h j j @2

# --- Essential Paths & Environment ---
mg_base_path: "{madgraph.mg_base_path}"
generation_scratch_dir: "{madgraph.generation_scratch_dir}"

# --- Card Customizations (LO+MLM) ---
run_mode: "lo_mlm"
card_customizations:
  run_card:
    "ebeam1": 7000.0   # 14 TeV centre-of-mass
    "ebeam2": 7000.0
    "ickkw": 1         # MLM matching scheme
    # MLM matching scale (GeV). Must match JetMatching:qCut in the Pythia8
    # card. We use 30 GeV — slightly looser than ttbar+jets (40 GeV) to
    # account for the harder ttH scale (mttH ~ 500+ GeV) producing more
    # collinear shower activity, and consistent with the value used for
    # dihiggs (which has a similar overall hard scale).
    "xqcut": 30.0
    "auto_ptj_mjj": True
    "maxjetflavor": 5
    "use_syst": False
    "systematics_program": none
  pythia8_card:
    "JetMatching:merge": on
    "JetMatching:scheme": 1
    "JetMatching:jetAlgorithm": 2
    "JetMatching:coneRadius": 1.0
    "JetMatching:slowJetPower": 1
    "JetMatching:nQmatch": 5
    "JetMatching:nJetMax": 2
    # JetMatching:qCut is the MLM matching scale (Pythia side); it must be
    # strictly larger than the run_card xqcut (ME-side generation cut). The
    # repo convention is qCut = xqcut + 10 GeV (cf. dihiggs: 20/30,
    # diphoton: 20/30, jets: 40/50).
    "JetMatching:qCut": 40.0
    "JetMatching:doShowerKt": off
    "JetMatching:setMad": off
    "UncertaintyBands:doVariations": off

# --- Logging ---
log_level: "INFO"

# --- Documentation ---
# After running this stage successfully, the compiled process is stored at
# {output_base_dir}/{campaign}/{dataset}/{version}/madgraph_process/ and
# archived as {output_base_dir}/{campaign}/{dataset}/{version}/madgraph_process.tgz
# (the tarball is the canonical artifact consumed by madgraph_generation).
#
# Expected runtime: ~1-3 hours for LO ttH+2j compilation
# Expected storage: ~100-300 MB for the compiled process directory
