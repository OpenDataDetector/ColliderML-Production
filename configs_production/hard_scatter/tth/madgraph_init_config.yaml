#========================================================================
# YAML Configuration for MadGraph Process Initialization (NLO ttH + FxFx)
#========================================================================
#
# Two-step MadGraph workflow:
# 1. madgraph_init: Generate and compile the process (this config)
# 2. madgraph_generation: Parallel event generation using the compiled process
#
# Process: pp -> t t~ H at NLO QCD, merged with one extra jet via FxFx
# (NLO matrix elements for ttH + 0,1 jets, matched to Pythia8 parton shower).
#
# Higgs is left undecayed at the matrix-element level so that Pythia8 handles
# H decays inclusively according to Standard Model branching ratios. This
# matches the inclusive-ttH conventions used by ATLAS/CMS (e.g. ATL-PHYS-PUB-
# 2019-007 and the LHC Higgs Cross-Section WG recommendations) and lets the
# same sample serve every H decay channel downstream.
#
# Note: ttH+2j at NLO with FxFx is prohibitively expensive; we match up to
# one additional jet, which captures the dominant hard-radiation effects for
# this 2->3 process while keeping compile time and matrix-element evaluation
# tractable. ttbar (a 2->2 process) goes up to +2 jets in this repo for the
# same reason — the cost scales steeply with multiplicity.
#
# The madgraph_init stage is run once per dataset version as a monolithic
# job, since the process generation cannot be parallelized.

# --- Dataset & Version ---
campaign: "hard_scatter"
dataset: "tth"
version: "v1"
stage: "madgraph_init"

# --- Job Configuration ---
job_config:
  n_runs: 1
  runs_per_node: 1
  time_limit: "12:00:00"  # NLO ttH compilation is heavier than ttbar
  qos: "regular"
  execution_mode: "monolithic_slurm"
  # execution_mode: "interactive"

# --- MadGraph Process Definition ---
# 5-flavour scheme with massless b's (b's from t->Wb are produced by decay
# and not affected by the 5F vs 4F choice for the production ME).
mg_model: "sm-no_b_mass"
mg_definitions: []
mg_generate_command: |
  generate p p > t t~ h [QCD]
  add process p p > t t~ h j [QCD]

# --- Essential Paths & Environment ---
mg_base_path: "{madgraph.mg_base_path}"
generation_scratch_dir: "{madgraph.generation_scratch_dir}"

# --- Card Customizations (NLO + FxFx) ---
card_customizations:
  run_card:
    "parton_shower": "PYTHIA8"
    "ebeam1": 7000.0   # 14 TeV centre-of-mass
    "ebeam2": 7000.0
    # "ickkw": 3       # FxFx for NLO is set automatically by MadGraph
    "ptj": 20.0        # Generation-level minimum jet pT

  # NLO processes use shower_card.dat
  shower_card:
    # Qcut is the FxFx merging scale. It MUST equal the value used in the
    # Pythia8 JetMatching:qCutME (set automatically from the run card).
    # Typical FxFx scale for tt+X processes is 30 GeV; we use 30 GeV here,
    # below the 40 GeV used by inclusive ttbar to compensate for the
    # softer additional-jet activity in ttH (one fewer jet in the merged
    # multiplicity ladder).
    "Qcut": 30.0
    "time_shower_me_corrections": "F"
    # "njmax": 1       # 0,1 jet ME from NLO process — set automatically
    # "matching_mode": 0  # FxFx mode

  # Pythia8 settings used only for loop-induced (noborn) processes; for
  # this NLO (born) process Pythia is configured via shower_card. Kept
  # here as documentation/parity with the ttbar config.
  pythia8_card: {}

# --- Logging ---
log_level: "INFO"

# --- Documentation ---
# Higgs decays are handled inclusively by Pythia8 at the hadronisation
# stage (default H BRs at mH = 125 GeV). To restrict to a specific H decay
# channel later (e.g. H->bb), add to the pythia8_card / shower_card:
#   "25:onMode": "off"
#   "25:onIfAny": "5 -5"   # for H -> b b~
#
# After running this stage successfully, the compiled process is stored at
# {output_base_dir}/{campaign}/{dataset}/{version}/madgraph_process/ and
# archived as {output_base_dir}/{campaign}/{dataset}/{version}/madgraph_process.tgz
# (the tarball is the canonical artifact consumed by madgraph_generation).
#
# Expected runtime: 4-12 hours for NLO ttH compilation
# Expected storage: ~200-700 MB for the compiled process directory
