# Example configuration
campaign: "hard_scatter"
dataset: "zprime"
version: "v1"
stage: "simulation"  # One of: generation, merge_smear, simulation, digitization
job_config:
  # Number of nodes will be calculated as n_runs / runs_per_node
  # n_runs: 1000  # Number of jobs to submit
  n_runs: 32
  runs_per_node: 16  # Number of runs per node
  time_limit: "00:30:00"  # Time limit per job
  qos: "debug"
  execution_mode: "multi_node_slurm"
  # execution_mode: "interactive"
  # depends_on: 

# Stage-specific configurations
events: 64  # Number of events per run, total number of events will be n_runs * events
input_filename: events_signal.hepmc3
threads: 8
minimalKineticEnergy: 0.1  # Minimum kinetic energy in GeV to register in truth
truthParticleHandler: "Geant4FullTruthParticleHandler"
pdg_file: "/global/cfs/cdirs/m4958/usr/danieltm/ColliderML/software/colliderml_dev/configs_production/hard_scatter/zprime/particle.tbl"

# Vertex smearing configuration (applied during simulation since hardscatter skips pythia merge smearing)
vertexOffset: [0.0, 0.0, 0.0, 0.0]  # x, y, z, t in mm, mm, mm, ns
vertexSigma: [0.0125, 0.0125, 55.5, 0.185]  # x, y, z, t in mm, mm, mm, ns

# DDSim verbosity control (optional)
ddsim_printLevel: 5  # 1=VERBOSE, 2=DEBUG, 3=INFO, 4=WARNING(default), 5=ERROR, 6=FATAL, 7=ALWAYS

# Filter out specific Geant4 warnings (optional)
filter_g4_warnings: true  # Filter out mass tolerance and other G4Exception warnings

