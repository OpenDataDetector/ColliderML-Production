#========================================================================
# YAML Configuration for Digitization of ttbar Events
#========================================================================

# --- Dataset & Version ---
campaign: "full_pileup_mini_pilot"
dataset: "ttbar"
version: "v6"
stage: "digitization"  # One of: generation, merge_smear, simulation, digitization

# --- Job Configuration ---
job_config:
  execution_mode: "distributed_slurm"
  n_runs: 10  # Number of jobs to submit
  runs_per_node: 10  # Number of runs per node
  time_limit: "00:30:00"  # Time limit per job
  qos: "debug"

# --- Validation Configuration ---
validation_config:

# --- Stage-specific Configurations ---
events: 128  # Number of events per run, total number of events will be n_runs * events
digi: True
reco: False

# --- Writing Configuration ---
output_root: True
performance_metrics: True
output_csv: True

# --- Debugging Commands ---
# debug_output_dir: /global/cfs/cdirs/m4958/data/ColliderML/public/full_pileup_mini_pilot/ttbar/v6/runs/0