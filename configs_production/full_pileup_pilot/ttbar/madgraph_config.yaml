#========================================================================
# YAML Configuration for MadGraph NLO ttbar (FxFx) Generation
#========================================================================

# --- Dataset & Version ---
campaign: "full_pileup_pilot"
dataset: "ttbar"
version: "v8"
stage: "madgraph_generation"  # One of: madgraph_generation, pythia_generation, merge_smear, simulation, digitization
job_config:
  execution_mode: "interactive"

# --- MadGraph Process Definition ---
mg_model: "sm"
mg_definitions: [] # No specific lepton definitions needed for inclusive ttbar
mg_generate_command: "generate p p > t t~ [QCD]"

# --- Essential Paths & Environment ---
# These now use variables from env_setup.yaml config_defaults
mg_base_path: "{madgraph.mg_base_path}"
generation_scratch_dir: "{madgraph.generation_scratch_dir}" 
output: "{madgraph.output}"

# --- MadGraph Event Settings ---
events: 8               
seed: 42                   

# --- Card Templates ---
card_templates:
  pythia8_card: "{templates.pythia8_card_fxfx}" # Now uses variable from env_setup.yaml
  # param_card: "param_card_ttbar_template.dat" # If you need to set top mass, width, etc.

# --- Card Customizations ---
card_customizations:
  run_card:
    "xqcut": 60.0          # Shower-kT starting scale (GeV) for ttbar - NEEDS TUNING
    "parton_shower": "PYTHIA8" 
    # For ttbar, you might also want to ensure these are set appropriately in the run_card via regex or have good defaults:
    # "ickkw": 1           # FxFx merging scheme
    # "maxjetflavor": 5    # For 5F PDF schemes (if top is not a jet flavour)
    # "auto_ptj_bias": ".true." # May improve efficiency for some NLO processes

  pythia8_card: 
    "{{XQCUT}}": 60.0        # MUST be IDENTICAL to the run_card xqcut value.
    "{{PYTHIA_SEED}}": 42 
    "{{NEVENTS}}": 10000 # Matches global 'events', though often ignored by Pythia when MG drives
    "{{N_JET_MAX_MATCH}}": 1 # For t t~ + 0,1 jet ME from 'generate p p > t t~ [QCD]'
    "{{PYTHIA_TUNE}}": 14    # Example: Monash 2013 tune (Tune:pp = 5 for older default)
    # "{{PDF_SET_NAME}}": "NNPDF31_nlo_as_0118" # Set if PDF:pSet is uncommented in template
    "{{JET_MATCH_CONE_R}}": 1.0
    "{{JET_MATCH_ETA_MAX}}": 5.0
    # Add ttbar specific Pythia8 settings if your template supports them:
    # e.g., settings for top decays, different tunes, etc.
    # "Top:all ": "on" # Example if Pythia8 needs to be told to decay tops (usually does by default)

splitting_config:
  enable: false
  events_per_file: 32
  output_filename: "events.hepmc3"

# --- Logging ---
log_level: "INFO" 