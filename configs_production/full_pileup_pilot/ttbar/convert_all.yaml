# Config to drive convert_all.py
campaign: "full_pileup_pilot"
dataset: "ttbar"
version: "v2"
stage: "convert_all"

# Job submission configuration
job_config:
  n_runs: 1  # Number of jobs to submit
  runs_per_node: 1  # Number of runs per node
  time_limit: "00:30:00"  # Time limit per job
  qos: "debug"
  # execution_mode: "interactive"
  execution_mode: "multi_node_slurm"

# Objects to convert (any subset of: digihits, hits, tracks, particles, calorimeter)
objects:
  - tracker_hits
  # - tracks
  - particles
  # - calorimeter

# Chunking
chunk_size: 100
run_size: 128

# Column selection for H5 outputs
particles_columns_keep:
  - "particle_id"
  - "pdg_id"
  - "mass"
  - "energy"
  - "charge"
  - "vx"
  - "vy"
  - "vz"
  - "time"
  - "px"
  - "py"
  - "pz"
  - "vertex_primary"
  - "parent_id"

digihits_columns_keep:
  - "x"
  - "y"
  - "z"
  - "time"
  - "particle_id"
  - "cell_id"
  - "detector"
  - "volume_id"
  - "layer_id"
  - "surface_id"
  - "event_id"

# Processing parameters
max_chunks: 8
min_tracker_hits: 1

log_level: "INFO"