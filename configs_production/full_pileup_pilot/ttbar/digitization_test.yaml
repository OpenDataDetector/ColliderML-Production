#========================================================================
# YAML Configuration for Digitization of ttbar Events
#========================================================================

# --- Dataset & Version ---
campaign: "full_pileup_mini_pilot"
dataset: "ttbar"
version: "v1"
stage: "digitization"  # One of: generation, merge_smear, simulation, digitization

# --- Job Configuration ---
job_config:
  execution_mode: "interactive"
  n_runs: 16  # Number of jobs to submit
  runs_per_node: 8  # Number of runs per node
  time_limit: "00:05:00"  # Time limit per job
  qos: "debug"

# --- Validation Configuration ---
validation_config:

# --- Stage-specific Configurations ---
events: 2  # Number of events per run, total number of events will be n_runs * events
digi: True
reco: True

# --- Writing Configuration ---
output_root: True
performance_metrics: True
output_csv: True

# --- Debugging Commands ---
debug_output_dir: /global/cfs/cdirs/m4958/data/ColliderML/simulation/full_pileup_mini_pilot/ttbar/v1/runs/0