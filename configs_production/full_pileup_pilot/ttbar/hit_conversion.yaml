# Configuration for track conversion postprocessing
campaign: "full_pileup_pilot"
dataset: "ttbar"
version: "v2"
stage: "build_tracker_hits"

# Job submission configuration
job_config:
  n_runs: 16  # Number of jobs to submit
  runs_per_node: 8  # Number of runs per node
  time_limit: "00:30:00"  # Time limit per job
  qos: "debug"
  # execution_mode: "interactive"
  execution_mode: "multi_node_slurm"

validation_config:

# Track conversion specific configuration
chunk_size: 1000  # Number of events per output file
run_size: 128      # Number of events per run
# max_chunks: 1