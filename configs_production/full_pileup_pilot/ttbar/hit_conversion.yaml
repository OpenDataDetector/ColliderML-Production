# Configuration for track conversion postprocessing
campaign: "full_pileup_pilot"
dataset: "ttbar"
version: "v2"
stage: "build_tracker_hits"

# Job submission configuration
job_config:
  n_runs: 100  # Number of jobs to submit
  runs_per_node: 100  # Number of runs per node
  time_limit: "04:00:00"  # Time limit per job
  qos: "regular"
  execution_mode: "interactive"

validation_config:

# Track conversion specific configuration
chunk_size: 100  # Number of events per output file
run_size: 128      # Number of events per run
max_chunks: 1