# Configuration for track conversion postprocessing
campaign: "full_pileup_mini_pilot"
dataset: "ttbar"
version: "v4"
stage: "build_tracker_hits"

# Job submission configuration
job_config:
  n_runs: 9  # Number of jobs to submit
  runs_per_node: 9  # Number of runs per node
  time_limit: "04:00:00"  # Time limit per job
  qos: "regular"
  execution_mode: "interactive"

validation_config:

# Track conversion specific configuration
chunk_size: 288  # Number of events per output file
run_size: 32      # Number of events per run
