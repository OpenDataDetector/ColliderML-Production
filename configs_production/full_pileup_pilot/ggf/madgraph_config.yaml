#========================================================================
# YAML Configuration for MadGraph NLO Gluon-Gluon Fusion Higgs (gg → H) Generation  
#========================================================================

# --- Dataset & Version ---
campaign: "full_pileup_pilot"
dataset: "ggf"
version: "v1"
stage: "madgraph_generation"  # One of: madgraph_generation, pythia_generation, merge_smear, simulation, digitization
job_config:
  execution_mode: "interactive"

# --- MadGraph Process Definition ---
mg_model: "sm"  # Use loop_sm model for NLO loop-induced processes
mg_definitions: [] 
mg_generate_command: "generate g g > h QED<=1 [QCD]"  # GGF Higgs at NLO, specifying explicit coupling order

# --- Essential Paths & Environment ---
mg_base_path: "/global/cfs/projectdirs/m4958/usr/danieltm/ColliderML/software/OtherLibraries/MG5_aMC_v3_5_8"
generation_scratch_dir: "/pscratch/sd/d/danieltm/ColliderML/mg_scratch" 
output: "/global/cfs/projectdirs/m4958/data/ColliderML/simulation/"

# --- MadGraph Event Settings ---
events: 1024               
seed: 42                   

# --- Card Templates ---
card_templates:
  # For loop-induced processes, we must use a standard Pythia8 card, not one designed for FxFx.
  pythia8_card: "/global/cfs/cdirs/m4958/usr/danieltm/ColliderML/software/OtherLibraries/MG5_aMC_v3_5_8/Template/LO/Cards/pythia8_card_default.dat"

# --- Card Customizations ---
card_customizations:
  run_card:
    "xqcut": 0.0          # Lower xqcut for electroweak single Higgs
    "parton_shower": "PYTHIA8"

  pythia8_card: 
    # These customizations apply to the standard pythia8_card_default.dat
    "{{XQCUT}}": 0.0        # MUST be IDENTICAL to the run_card xqcut value
    "{{PYTHIA_SEED}}": 42 
    "{{NEVENTS}}": 10000 
    "{{PYTHIA_TUNE}}": 14    # Monash 2013 tune

splitting_config:
  enable: true
  events_per_file: 32
  output_filename: "events.hepmc3"

common:
  output_base_dir: "/global/cfs/projectdirs/m4958/data/ColliderML/simulation/"
  account: "m4958"
  container: "registry.cern.ch/atlasadc/atlas-grid-almalinux9"

# --- Logging ---
log_level: "INFO" 