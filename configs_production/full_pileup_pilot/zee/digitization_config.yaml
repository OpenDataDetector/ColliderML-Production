#========================================================================
# YAML Configuration for Digitization of zee Events
#========================================================================

# --- Dataset & Version ---
campaign: "full_pileup_pilot"
dataset: "zee"
version: "v1"
stage: "digitization"  # One of: generation, merge_smear, simulation, digitization

# --- Job Configuration ---
job_config:
  n_runs: 100  # Number of jobs to submit
  runs_per_node: 1  # Number of runs per node
  time_limit: "00:30:00"  # Time limit per job
  qos: "regular"
  execution_mode: "multi_node_slurm"
  depends_on: "42402387"

# --- Validation Configuration ---
validation_config:
  time_limit: "00:60:00"
  qos: "regular"

# --- Stage-specific Configurations ---
events: 128  # Number of events per run, total number of events will be n_runs * events
threads: 64
digi: True
reco: True
num_seeds_per_spm: 20

# --- Writing Configuration ---
output_root: True
performance_metrics: True
output_csv: True
output_all_particles: True

