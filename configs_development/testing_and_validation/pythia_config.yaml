# Default Pythia8 configuration
default:
  hard_process: "HardQCD:gg2gg"
  pileup: 200
  vertex_mean: [0, 0, 0, 0]  # x, y, z, t
  vertex_stddev: [0.0125, 0.0125, 55.5, 5.0]  # in mm, mm, mm, ns

# Example preset configurations
ttbar:
  hard_process: "Top:qqbar2ttbar"
  pileup: 200

qcd_all:
  hard_process: "HardQCD:all"
  pileup: 100

minimum_bias:
  hard_process: "SoftQCD:inelastic"
  pileup: 50 