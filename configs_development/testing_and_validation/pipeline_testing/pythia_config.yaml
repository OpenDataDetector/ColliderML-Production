# Example configuration
campaign: "full_pileup_pilot"
dataset: "ttbar"
version: "v1"
stage: "pythia_generation"  # One of: generation, merge_smear, simulation, digitization
job_config:
  # Number of nodes will be calculated as n_runs / runs_per_node
  n_runs: 1280  # Number of runs (where a run produces N events)
  runs_per_node: 128  # Number of runs per node
  time_limit: "00:30:00"  # Time limit per job
  qos: "regular"
  execution_mode: "interactive"

validation_config:
  time_limit: "00:10:00"
  qos: "regular"

# Stage-specific configurations
events: 128  # Number of events per run, total number of events will be n_runs * events
pileup: 200
hard_process:
vertex_sigma_xy: 
vertex_sigma_z: 
vertex_sigma_t: 

# Common settings
common:
  output_base_dir: "/global/cfs/projectdirs/m4958/data/ColliderML/simulation/"
  account: "m4958"
  container: "registry.cern.ch/atlasadc/atlas-grid-almalinux9"
