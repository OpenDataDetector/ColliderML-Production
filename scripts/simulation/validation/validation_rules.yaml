# Validation Rules for Pipeline Stages
#
# This file defines file patterns and validation thresholds for each pipeline stage.
# Used by validation_lib.py to check stage outputs.

stages:
  # Stage 0: MadGraph Initialization
  madgraph_init:
    description: "Validate MadGraph process initialization"
    output_location: "." # Relative to version directory
    file_patterns:
      - pattern: "madgraph_process.tgz"
        description: "Compressed MadGraph process directory"
        min_size_mb: 100.0
        required: true

  # Stage 1a: Particle Gun Generation
  particlegun_generation:
    description: "Validate particle gun generation outputs (HepMC3 files)"
    file_patterns:
      - pattern: "events.hepmc3"
        description: "Particle gun events"
        min_size_mb: 0.01
        median_threshold_pct: 0.8
        required: true
        
  # Stage 2: Event Generation (MadGraph)
  madgraph_generation:
    description: "Validate event generation outputs (HepMC3 files)"
    file_patterns:
      - pattern: "events.hepmc3"
        description: "Hard-scatter events"
        min_size_mb: 0.1
        median_threshold_pct: 0.8
        required: true

  # Stage 3: Pythia Hadronization + Pileup Merging
  pythia_generation:
    description: "Validate Pythia generation and merged events"
    # Require at least one of the following files to exist per run.
    # This supports cases where pileup merging is optional / conditional.
    require_any_of:
      - pattern: "merged_events.hepmc3"
        description: "Merged hard-scatter + pileup events"
        check_type: "size"
        min_size_mb: 1.0
      - pattern: "events_signal.hepmc3"
        description: "Unmerged signal-only events"
        check_type: "size"
        min_size_mb: 0.1
      - pattern: "events_pileup.hepmc3"
        description: "Unmerged pileup-only events"
        check_type: "size"
        min_size_mb: 0.1
    file_patterns:
      - pattern: "merged_events.hepmc3"
        description: "Merged hard-scatter + pileup events"
        min_size_mb: 1.0
        median_threshold_pct: 0.8
        required: false
      - pattern: "events_signal.hepmc3"
        description: "Unmerged signal-only events"
        min_size_mb: 0.1
        median_threshold_pct: 0.8
        required: false

  # Stage 4: Geant4 Detector Simulation
  simulation:
    description: "Validate Geant4 simulation outputs"
    file_patterns:
      - pattern: "edm4hep.root"
        description: "EDM4hep simulation output"
        min_size_mb: 1.0
        median_threshold_pct: 0.95
        required: true

  # Stage 5: Calorimeter Digitization (Key4hep)
  calo_digitization:
    description: "Validate calorimeter digitization outputs"
    file_patterns:
      - pattern: "edm4hep_digitized.root"
        description: "Calorimeter cells after digitization"
        min_size_mb: 1.0
        median_threshold_pct: 0.8
        required: true

  # Stage 6: Tracker Digitization + Track Reconstruction (ACTS)
  digitization:
    description: "Validate tracker digitization and tracking outputs"
    file_patterns:
      - pattern: "measurements.root"
        description: "Track measurements"
        min_size_mb: 0.001
        median_threshold_pct: 0.6
        required: true

      - pattern: "particles.root"
        description: "Particles after digitization"
        min_size_mb: 0.001
        median_threshold_pct: 0.6
        required: true

      - pattern: "tracksummary_ambi.root"
        description: "Track summary after digitization"
        min_size_mb: 0.001
        median_threshold_pct: 0.6
        required: true

      - pattern: "performance_finding_ambi.root"
        description: "Track finding performance metrics"
        min_size_mb: 0.001
        median_threshold_pct: 0.5
        required: true

      - pattern: "performance_fitting_ambi.root"
        description: "Track fitting performance metrics"
        min_size_mb: 0.001
        median_threshold_pct: 0.5
        required: true

  # Stage 7: HDF5/Parquet Conversion
  convert_all:
    description: "Validate Parquet conversion outputs"
    # Special: convert_all outputs go to version-level directories, not per-run
    # Use output_location to specify alternative search location
    output_location: "parquet"  # Relative to version directory (campaign/dataset/version/)
    # For convert_all, we validate individual chunk files rather than per-run outputs
    validate_as_chunks: true
    file_patterns:
      - pattern: "reco/calo_hits/*.parquet"
        object_type: "calo_hits"
        description: "Calorimeter hits parquet files"
        min_size_mb: 10.0
        median_threshold_pct: 0.8
        required: true
      
      - pattern: "reco/tracker_hits/*.parquet"
        object_type: "tracker_hits"
        description: "Tracker hits parquet files"
        min_size_mb: 10.0
        median_threshold_pct: 0.8
        required: true
      
      - pattern: "reco/tracks/*.parquet"
        object_type: "tracks"
        description: "Tracks parquet files"
        min_size_mb: 0.1
        median_threshold_pct: 0.8
        required: true
      
      - pattern: "truth/particles/*.parquet"
        object_type: "particles"
        description: "Particles parquet files"
        min_size_mb: 10.0
        median_threshold_pct: 0.8
        required: true

# Global defaults (can be overridden per pattern)
defaults:
  median_threshold_pct: 0.8  # Files must be >= 80% of median size
  check_type: "size"          # Default to size-based checking